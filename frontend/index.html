<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dental Match</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DentalMatch" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Conectá estudiantes de odontología con pacientes" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        background-color: #f8fafc;
        color: #0f172a;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(15px, -20px) rotate(3deg); }
        50% { transform: translate(-8px, -35px) rotate(-3deg); }
        75% { transform: translate(-20px, -15px) rotate(2deg); }
      }

      @keyframes floatSlow {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(20px, -30px) rotate(5deg); }
        66% { transform: translate(-15px, -15px) rotate(-4deg); }
      }

      @keyframes floatMicro {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(2px, -3px); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.05); }
      }

      @keyframes pulseSlow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.45; transform: scale(1.03); }
      }

      @keyframes morphBlob {
        0%, 100% {
          border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        25% {
          border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
        }
        50% {
          border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%;
        }
        75% {
          border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
        }
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .blob-animated {
        animation: morphBlob 12s ease-in-out infinite, float 10s ease-in-out infinite;
      }

      .blob-animated-slow {
        animation: morphBlob 18s ease-in-out infinite reverse, floatSlow 14s ease-in-out infinite;
      }

      .blob-animated-slower {
        animation: morphBlob 22s ease-in-out infinite reverse, floatSlow 18s ease-in-out infinite;
      }

      .blob-animated-micro {
        animation: floatMicro 6s ease-in-out infinite;
      }

      .pulse-glow {
        animation: pulse 5s ease-in-out infinite;
      }

      .pulse-glow-slow {
        animation: pulseSlow 7s ease-in-out infinite;
      }

      .gradient-animated {
        background-size: 200% 200%;
        animation: gradientShift 8s ease infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker para PWA (cache offline + instalable) -->
    <script>
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
